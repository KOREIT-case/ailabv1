<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 일잘러 유형 테스트</title>
<style>
  :root{
    --bg: #0e0f13;
    --card: #181a21;
    --card-border: #262933;
    --text: #eef0f5;
    --text-dim: #9a9fae;
    --accent: #8b8fff;
    --accent-soft: rgba(139,143,255,0.15);
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(circle at 20% 20%, #171a24 0%, #0e0f13 55%);
    color: var(--text);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body{
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  .app{
    width:100%; max-width:520px;
  }
  .card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    position: relative;
    overflow: hidden;
    animation: fadeIn .5s ease;
  }
  .card::before{
    content:"";
    position:absolute; top:-60%; right:-40%;
    width: 300px; height:300px;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    pointer-events:none;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .screen{ display:none; }
  .screen.active{ display:block; }

  /* start screen */
  .badge{
    display:inline-block;
    font-size:12px;
    letter-spacing: .08em;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 18px;
    font-weight:600;
  }
  h1{
    font-size: 28px;
    line-height:1.35;
    margin: 0 0 14px;
    letter-spacing: -0.02em;
  }
  .desc{
    color: var(--text-dim);
    font-size: 15px;
    line-height:1.6;
    margin-bottom: 32px;
  }
  .type-preview{
    display:flex; gap:10px; margin-bottom: 32px; flex-wrap:wrap;
  }
  .type-chip{
    font-size:13px;
    padding: 8px 12px;
    border-radius: 12px;
    background: #1f222b;
    border: 1px solid var(--card-border);
    color: var(--text-dim);
  }
  button{
    font-family: inherit;
    cursor:pointer;
    border:none;
  }
  .btn-primary{
    width:100%;
    padding: 16px;
    font-size: 16px;
    font-weight:700;
    color:#0e0f13;
    background: linear-gradient(135deg, #a5a8ff, #7d82ff);
    border-radius: 14px;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(125,130,255,0.35);
  }
  .btn-secondary{
    width:100%;
    margin-top:12px;
    padding: 14px;
    font-size: 14px;
    font-weight:600;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--card-border);
    border-radius: 14px;
    transition: background .15s ease;
  }
  .btn-secondary:hover{ background: #1f222b; }

  /* question screen */
  .progress-wrap{
    display:flex; align-items:center; gap:10px; margin-bottom: 28px;
  }
  .progress-bar{
    flex:1; height:6px; background:#22252f; border-radius:999px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background: linear-gradient(90deg,#8b8fff,#c48bff);
    border-radius:999px; transition: width .35s ease;
  }
  .progress-label{
    font-size:12px; color: var(--text-dim); white-space:nowrap; font-weight:600;
  }
  .question-text{
    font-size:20px;
    font-weight:700;
    line-height:1.5;
    margin-bottom:24px;
  }
  .options{
    display:flex; flex-direction:column; gap:10px;
  }
  .option-btn{
    text-align:left;
    padding: 16px 18px;
    background:#1f222b;
    border: 1px solid var(--card-border);
    border-radius: 14px;
    color: var(--text);
    font-size: 14.5px;
    line-height:1.5;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .option-btn:hover{
    border-color: var(--accent);
    background: #24273a;
    transform: translateX(2px);
  }

  /* result screen */
  .result-emoji{
    font-size: 64px;
    text-align:center;
    margin-bottom: 8px;
  }
  .result-tagline{
    text-align:center;
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 6px;
  }
  .result-name{
    text-align:center;
    font-size: 26px;
    font-weight:800;
    margin-bottom: 20px;
  }
  .result-desc{
    font-size: 14.5px;
    line-height:1.7;
    color: var(--text-dim);
    margin-bottom: 22px;
  }
  .strength-title{
    font-size:12px;
    color: var(--text-dim);
    letter-spacing:.05em;
    margin-bottom:10px;
    font-weight:700;
  }
  .strengths{
    display:flex; flex-direction:column; gap:8px;
    margin-bottom: 28px;
  }
  .strength-item{
    display:flex; align-items:center; gap:8px;
    font-size:14px;
    padding:10px 14px;
    background:#1f222b;
    border-radius:12px;
    border:1px solid var(--card-border);
  }
  .strength-item::before{
    content:"✓";
    color: var(--accent);
    font-weight:800;
  }
  footer{
    text-align:center;
    margin-top:18px;
    font-size:12px;
    color:#5c6070;
  }
</style>
</head>
<body>
<div class="app">
  <div class="card">

    <!-- 시작 화면 -->
    <div class="screen active" id="screen-start">
      <span class="badge">WORK TYPE TEST</span>
      <h1>나의 일잘러 유형 테스트</h1>
      <p class="desc">
        5개의 질문에 답하면 당신이 일할 때 가장 빛나는 스타일을
        4가지 유형 중 하나로 알려드려요. 솔직하게, 평소 업무 상황을 떠올리며 골라보세요.
      </p>
      <div class="type-preview">
        <span class="type-chip">🧭 전략가형</span>
        <span class="type-chip">🚀 해결사형</span>
        <span class="type-chip">🤝 조율자형</span>
        <span class="type-chip">💡 혁신가형</span>
      </div>
      <button class="btn-primary" onclick="startTest()">테스트 시작하기</button>
    </div>

    <!-- 질문 화면 -->
    <div class="screen" id="screen-question">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-label" id="progressLabel">1 / 5</span>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>

    <!-- 결과 화면 -->
    <div class="screen" id="screen-result">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-tagline" id="resultTagline"></div>
      <div class="result-name" id="resultName"></div>
      <p class="result-desc" id="resultDesc"></p>
      <div class="strength-title">이런 강점이 있어요</div>
      <div class="strengths" id="resultStrengths"></div>
      <button class="btn-primary" onclick="restartTest()">다시 테스트하기</button>
    </div>

    <footer>© 나의 일잘러 유형 테스트</footer>
  </div>
</div>

<script>
  const TYPES = {
    strategist: {
      name: "전략가형",
      emoji: "🧭",
      tagline: "큰 그림을 그리는 설계자",
      desc: "치밀한 분석과 계획으로 일을 시작하는 당신. 리스크를 미리 점검하고 목표부터 명확히 세우기 때문에 흔들림 없이 프로젝트를 이끌어요. 즉흥적인 실행보다 탄탄한 밑그림이 있을 때 진가를 발휘하는 타입입니다.",
      strengths: ["체계적인 계획 수립", "리스크 예측 및 대비", "데이터 기반 의사결정"]
    },
    solver: {
      name: "해결사형",
      emoji: "🚀",
      tagline: "일단 부딪혀서 답을 찾는 행동파",
      desc: "고민보다 실행이 빠른 당신. 문제가 생기면 분석에 시간을 쓰기보다 직접 부딪히며 답을 찾아냅니다. 빠른 실행력과 순발력으로 예상 밖의 위기도 거뜬히 돌파하는 타입입니다.",
      strengths: ["빠른 실행력", "순발력 있는 문제 해결", "강한 추진력"]
    },
    harmonizer: {
      name: "조율자형",
      emoji: "🤝",
      tagline: "팀의 균형을 맞추는 연결자",
      desc: "사람과 사람 사이를 잇는 데 강한 당신. 다양한 의견을 조율하고 신뢰를 바탕으로 팀워크를 만들어냅니다. 혼자 잘하는 것보다 함께 잘할 때 더 큰 힘을 발휘하는 타입입니다.",
      strengths: ["원활한 커뮤니케이션", "갈등 조정 능력", "신뢰 기반의 협업"]
    },
    innovator: {
      name: "혁신가형",
      emoji: "💡",
      tagline: "새로운 판을 짜는 아이디어 뱅크",
      desc: "틀에 갇히지 않는 발상으로 승부하는 당신. 기존 방식에 의문을 던지고 늘 새로운 접근을 시도합니다. 창의적인 아이디어로 팀에 신선한 자극을 불어넣는 타입입니다.",
      strengths: ["창의적 발상", "변화를 주도하는 힘", "새로운 시도를 두려워하지 않음"]
    }
  };

  const QUESTIONS = [
    {
      text: "새로운 프로젝트를 맡았을 때, 가장 먼저 하는 일은?",
      options: [
        { text: "목표와 일정, 리스크를 꼼꼼히 정리한 계획표부터 만든다", type: "strategist" },
        { text: "일단 작은 것부터 빠르게 시작해서 감을 잡는다", type: "solver" },
        { text: "관련된 사람들을 모아 의견을 듣고 역할을 나눈다", type: "harmonizer" },
        { text: "\"이렇게 하면 더 재밌지 않을까?\" 하고 새로운 방식을 고민한다", type: "innovator" }
      ]
    },
    {
      text: "팀 회의에서 의견 충돌이 생기면 당신은?",
      options: [
        { text: "\"일단 해보고 판단하자\"며 실행으로 결론을 내자고 제안한다", type: "solver" },
        { text: "양쪽 입장을 듣고 절충안을 찾으려 한다", type: "harmonizer" },
        { text: "기존 틀을 벗어난 제3의 아이디어를 제시한다", type: "innovator" },
        { text: "데이터와 근거를 바탕으로 어느 쪽이 더 타당한지 분석한다", type: "strategist" }
      ]
    },
    {
      text: "마감 전날, 예상치 못한 문제가 터졌다! 당신의 대응은?",
      options: [
        { text: "관련 팀원들에게 상황을 공유하고 도움을 요청한다", type: "harmonizer" },
        { text: "기존 방식 대신 완전히 새로운 접근을 시도해본다", type: "innovator" },
        { text: "원인을 분석하고 대안 시나리오를 다시 짠다", type: "strategist" },
        { text: "바로 손을 걷어붙이고 해결책을 실행한다", type: "solver" }
      ]
    },
    {
      text: "동료가 당신에게 자주 하는 말은?",
      options: [
        { text: "\"그런 아이디어는 대체 어떻게 생각해낸 거야?\"", type: "innovator" },
        { text: "\"역시 꼼꼼하게 잘 정리하네\"", type: "strategist" },
        { text: "\"역시 실행력 하나는 최고야\"", type: "solver" },
        { text: "\"네 덕분에 팀 분위기가 좋아져\"", type: "harmonizer" }
      ]
    },
    {
      text: "당신이 생각하는 이상적인 업무 환경은?",
      options: [
        { text: "목표와 지표가 명확하고 체계적으로 굴러가는 곳", type: "strategist" },
        { text: "서로 소통하고 신뢰하는 협업 중심의 팀", type: "harmonizer" },
        { text: "빠르게 시도하고 빠르게 피드백 받을 수 있는 곳", type: "solver" },
        { text: "자유롭게 실험하고 새로운 걸 시도할 수 있는 곳", type: "innovator" }
      ]
    }
  ];

  let current = 0;
  const scores = { strategist: 0, solver: 0, harmonizer: 0, innovator: 0 };

  function showScreen(id){
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function startTest(){
    current = 0;
    Object.keys(scores).forEach(k => scores[k] = 0);
    showScreen("screen-question");
    renderQuestion();
  }

  function renderQuestion(){
    const q = QUESTIONS[current];
    document.getElementById("questionText").textContent = q.text;
    document.getElementById("progressLabel").textContent = (current + 1) + " / " + QUESTIONS.length;
    document.getElementById("progressFill").style.width = ((current) / QUESTIONS.length * 100) + "%";

    const wrap = document.getElementById("optionsWrap");
    wrap.innerHTML = "";
    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt.text;
      btn.onclick = () => selectOption(opt.type);
      wrap.appendChild(btn);
    });
  }

  function selectOption(type){
    scores[type]++;
    current++;
    if(current < QUESTIONS.length){
      renderQuestion();
    } else {
      document.getElementById("progressFill").style.width = "100%";
      showResult();
    }
  }

  function showResult(){
    let bestType = "strategist";
    let bestScore = -1;
    Object.keys(scores).forEach(key => {
      if(scores[key] > bestScore){
        bestScore = scores[key];
        bestType = key;
      }
    });

    const result = TYPES[bestType];
    document.getElementById("resultEmoji").textContent = result.emoji;
    document.getElementById("resultTagline").textContent = result.tagline;
    document.getElementById("resultName").textContent = result.name;
    document.getElementById("resultDesc").textContent = result.desc;

    const strengthsWrap = document.getElementById("resultStrengths");
    strengthsWrap.innerHTML = "";
    result.strengths.forEach(s => {
      const div = document.createElement("div");
      div.className = "strength-item";
      div.textContent = s;
      strengthsWrap.appendChild(div);
    });

    showScreen("screen-result");
  }

  function restartTest(){
    showScreen("screen-start");
  }
</script>
</body>
</html>
