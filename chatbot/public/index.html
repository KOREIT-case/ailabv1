<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>도시정비 법률 챗봇</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --border:#262b36;
    --text:#eef0f5; --dim:#9aa0ad; --accent:#4f7cff; --accent-soft:rgba(79,124,255,.14);
    --user:#233046; --warn:#f0b429;
  }
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;flex-direction:column;
    font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--text)}
  header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{margin:0;font-size:16px}
  header p{margin:4px 0 0;font-size:12px;color:var(--dim)}
  #chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:820px;width:fit-content;padding:12px 14px;border-radius:12px;
    line-height:1.55;font-size:14px;white-space:pre-wrap;word-break:break-word}
  .user{align-self:flex-end;background:var(--user)}
  .bot{align-self:flex-start;background:var(--panel);border:1px solid var(--border)}
  .bot .src{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);
    font-size:12px;color:var(--dim)}
  .notice{align-self:center;font-size:12px;color:var(--dim);text-align:center;max-width:640px}
  form{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border);background:var(--panel)}
  textarea{flex:1;resize:none;background:var(--bg);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;
    font-family:inherit;min-height:46px;max-height:160px}
  button{background:var(--accent);color:#fff;border:0;border-radius:10px;
    padding:0 18px;font-size:14px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
  <header>
    <h1>도시정비 법률 챗봇</h1>
    <p>한국토지신탁 도시정비사업 · 등록된 법령·판례·유권해석에만 근거해 답변합니다</p>
  </header>

  <div id="chat">
    <div class="notice">
      ⚠️ 이 챗봇은 등록된 자료에 근거한 <b>안내</b>이며 법률 자문이 아닙니다.
      중요한 판단은 담당자 확인을 권장합니다.
    </div>
  </div>

  <form id="form">
    <textarea id="input" placeholder="궁금한 점을 입력하세요 (예: 재건축 매도청구 요건이 어떻게 되나요?)"></textarea>
    <button id="send" type="submit">전송</button>
  </form>

<script>
  // Cloudflare Worker 엔드포인트 (배포됨: dosijeongbi-chatbot)
  const WORKER_URL = "https://dosijeongbi-chatbot.explozn87.workers.dev";

  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  const history = [];

  function add(role, text, sources){
    const el = document.createElement("div");
    el.className = "msg " + (role === "user" ? "user" : "bot");
    el.textContent = text;
    if (sources && sources.length){
      const s = document.createElement("div");
      s.className = "src";
      s.textContent = "근거: " + sources.map(fmt).join(" · ");
      el.appendChild(s);
    }
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
    return el;
  }
  function fmt(m){
    if(m.자료유형==="법령") return `${m.법령명||""} ${m.조문||""}`.trim();
    if(m.자료유형==="판례") return `판례 ${m.사건번호||""}`;
    if(m.자료유형==="유권해석") return `유권해석 ${m.문서번호||""}`;
    return "자료";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if(!q) return;
    add("user", q);
    history.push({role:"user", content:q});
    input.value = ""; send.disabled = true;
    const thinking = add("bot", "자료를 확인하는 중…");
    try{
      const res = await fetch(WORKER_URL, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ question:q, history })
      });
      const data = await res.json();
      thinking.remove();
      const answer = data.answer || data.error || "(응답 없음)";
      add("bot", answer, data.sources);
      history.push({role:"assistant", content:answer});
    }catch(err){
      thinking.textContent = "요청 중 오류가 발생했습니다: " + err;
    }finally{
      send.disabled = false; input.focus();
    }
  });

  // Enter 전송 / Shift+Enter 줄바꿈
  input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
  });
</script>
</body>
</html>
