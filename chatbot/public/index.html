<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>도시정비 법률 챗봇</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --border:#262b36;
    --text:#eef0f5; --dim:#9aa0ad; --accent:#4f7cff; --accent-soft:rgba(79,124,255,.14);
    --user:#233046; --warn:#f0b429; --err:#f0576a;
  }
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;flex-direction:column;
    font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg) center/cover fixed no-repeat;color:var(--text)}
  header{padding:14px 18px;border-bottom:1px solid var(--border);
    background:rgba(23,26,33,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    display:flex;align-items:center;justify-content:space-between;gap:12px}
  header h1{margin:0;font-size:16px}
  header p{margin:4px 0 0;font-size:12px;color:var(--dim)}
  #who{font-size:12px;color:var(--dim);white-space:nowrap;text-align:right}
  #who b{color:var(--text)}
  #logout{background:none;border:1px solid var(--border);color:var(--dim);
    border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;margin-top:4px}
  #chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:820px;width:fit-content;padding:12px 14px;border-radius:12px;
    line-height:1.55;font-size:14px;white-space:pre-wrap;word-break:break-word}
  .user{align-self:flex-end;background:var(--user)}
  .bot{align-self:flex-start;background:var(--panel);border:1px solid var(--border)}
  .bot .src{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);
    font-size:12px;color:var(--dim)}
  .bot .src .key{color:var(--accent);font-weight:600} /* 핵심 법리(최상위 근거) 강조 */
  .bot .src .arts{color:var(--text)} /* 조문 번호는 조금 더 또렷하게 */
  .bot strong{color:#fff;font-weight:700}
  .bot code{background:#0c0e12;padding:1px 5px;border-radius:5px;font-size:13px}
  .bot ul{margin:6px 0;padding-left:20px}
  .bot li{margin:2px 0}
  .notice{align-self:center;font-size:12px;color:var(--dim);text-align:center;max-width:640px}
  .scopebar{display:flex;gap:16px;align-items:center;padding:9px 18px;
    background:rgba(23,26,33,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--border);font-size:13px;color:var(--dim)}
  .scopebar label{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
  .scopebar input{accent-color:var(--accent);width:15px;height:15px;margin:0}
  .scopebar .hint{margin-left:auto;font-size:11px;color:var(--dim)}
  .scopebar select{background:rgba(23,26,33,.9);color:var(--fg);border:1px solid var(--border);
    border-radius:6px;padding:2px 6px;font-size:12px;cursor:pointer}
  .scopebar select:disabled{opacity:.4;cursor:not-allowed}
  form#form{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border);
    background:rgba(23,26,33,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  textarea{flex:1;resize:none;background:var(--bg);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;
    font-family:inherit;min-height:46px;max-height:160px}
  button{background:var(--accent);color:#fff;border:0;border-radius:10px;
    padding:0 18px;font-size:14px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}

  /* ── 로그인 화면 ── */
  #login{position:fixed;inset:0;z-index:100;background:var(--bg) center/cover fixed no-repeat;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .loginbox{width:100%;max-width:360px;text-align:center;
    background:rgba(18,21,28,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:34px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,.45)}
  .loginbox .logo{font-size:40px;margin-bottom:14px}
  .loginbox h1{margin:0 0 6px;font-size:20px}
  .loginbox p{margin:0 0 22px;font-size:13px;color:var(--dim);line-height:1.6}
  .loginbox input{width:100%;background:var(--panel);color:var(--text);
    border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:15px;
    font-family:inherit;margin-bottom:10px}
  .loginbox input:focus{outline:none;border-color:var(--accent)}
  .loginbox button{width:100%;padding:13px;font-size:15px;font-weight:600;margin-top:4px}
  #loginErr{color:var(--err);font-size:13px;min-height:18px;margin-top:10px}
  .loginfoot{margin-top:18px;font-size:11px;color:var(--dim);line-height:1.6}
</style>
</head>
<body>

  <!-- 로그인 화면 (인증 전) -->
  <div id="login">
    <div class="loginbox">
      <div class="logo">🏙️</div>
      <h1>도시정비 법률 챗봇</h1>
      <p>한국토지신탁 사내 전용<br>이름과 비밀번호를 입력하면 입장합니다</p>
      <input id="loginName" placeholder="이름 (예: 김명근)" autocomplete="name" />
      <input id="loginPw" type="password" placeholder="비밀번호" autocomplete="current-password" />
      <button id="loginBtn" type="button">입장하기</button>
      <div id="loginErr"></div>
      <div class="loginfoot">등록된 법령·판례·유권해석에만 근거해 답변하는 안내 도구입니다.</div>
    </div>
  </div>

  <!-- 앱 (인증 후) -->
  <header>
    <div>
      <h1>도시정비 법률 챗봇</h1>
      <p>한국토지신탁 도시정비사업 · 등록된 자료에만 근거해 답변합니다</p>
    </div>
    <div id="who"></div>
  </header>

  <div id="chat">
    <div class="notice">
      ⚠️ 이 챗봇은 등록된 자료에 근거한 <b>안내</b>이며 법률 자문이 아닙니다.
      중요한 판단은 담당자 확인을 권장합니다.
    </div>
  </div>

  <div class="scopebar">
    <span>검색 범위</span>
    <label><input type="checkbox" id="scLaw" checked /> 법령</label>
    <label><input type="checkbox" id="scPrec" /> 판례</label>
    <label><input type="checkbox" id="scOrd" /> 조례</label>
    <select id="scOrdRegion" disabled title="조례를 체크하면 지역을 선택할 수 있습니다">
      <option value="서울특별시">서울특별시</option>
      <option value="부산광역시">부산광역시</option>
      <option value="대구광역시">대구광역시</option>
      <option value="인천광역시">인천광역시</option>
      <option value="광주광역시">광주광역시</option>
      <option value="대전광역시">대전광역시</option>
      <option value="울산광역시">울산광역시</option>
      <option value="경기도">경기도</option>
    </select>
  </div>

  <form id="form">
    <textarea id="input" placeholder="궁금한 점을 입력하세요 (예: 재건축 매도청구 요건이 어떻게 되나요?)"></textarea>
    <button id="send" type="submit">전송</button>
  </form>

<script>
  // 앱과 같은 출처에서 서빙되므로 상대경로 사용(쿠키 자동 포함).
  const API = "";

  const $ = (id) => document.getElementById(id);
  const chat = $("chat"), form = $("form"), input = $("input"), send = $("send");
  function currentScope(){
    // 기본은 법령만. 조례는 체크 + 지역 선택 시에만 해당 지역 조례를 포함한다.
    const ord = $("scOrd").checked;
    return {
      law: $("scLaw").checked,
      prec: $("scPrec").checked,
      ordRegion: ord ? $("scOrdRegion").value : null,
    };
  }
  // 조례 체크박스에 따라 지역 드롭다운 활성화.
  $("scOrd").addEventListener("change", () => {
    $("scOrdRegion").disabled = !$("scOrd").checked;
  });
  const loginEl = $("login"), loginName = $("loginName"), loginPw = $("loginPw"),
        loginBtn = $("loginBtn"), loginErr = $("loginErr");
  const history = [];

  function getCookie(name){
    return document.cookie.split("; ").reduce((r, c) => {
      const [k, v] = c.split("=");
      return k === name ? decodeURIComponent(v) : r;
    }, "");
  }

  /* ── 배경: 4장 중 랜덤 (koreit 메인비주얼, 어둡게 가공) ── */
  (function setBg(){
    const n = 1 + Math.floor(Math.random() * 4);
    const url = `${API}/bg/${n}.jpg`;
    document.body.style.backgroundImage =
      `linear-gradient(rgba(15,17,21,.55), rgba(15,17,21,.70)), url("${url}")`;
    loginEl.style.backgroundImage =
      `linear-gradient(rgba(13,15,19,.42), rgba(13,15,19,.62)), url("${url}")`;
  })();

  /* ── 인증 ── */
  function enterApp(name){
    loginEl.style.display = "none";
    $("who").innerHTML = `<b>${name}</b>님<br><button id="logout" type="button">로그아웃</button>`;
    $("logout").addEventListener("click", doLogout);
    input.focus();
  }
  async function doLogin(){
    const name = loginName.value.trim(), pw = loginPw.value;
    if(!name){ loginErr.textContent = "이름을 입력하세요."; loginName.focus(); return; }
    if(!pw){ loginErr.textContent = "비밀번호를 입력하세요."; loginPw.focus(); return; }
    loginErr.textContent = ""; loginBtn.disabled = true;
    try{
      const res = await fetch(API + "/login", {
        method:"POST", headers:{"Content-Type":"application/json"},
        credentials:"same-origin",
        body: JSON.stringify({ name, password: pw })
      });
      const data = await res.json();
      if(data.ok){ enterApp(data.name || name); }
      else { loginErr.textContent = data.error || "비밀번호가 올바르지 않습니다."; loginPw.select(); }
    }catch(err){
      loginErr.textContent = "접속 오류: " + err;
    }finally{ loginBtn.disabled = false; }
  }
  async function doLogout(){
    try{ await fetch(API + "/logout", { method:"POST", credentials:"same-origin" }); }
    catch(e){}
    location.reload();
  }
  loginBtn.addEventListener("click", doLogin);
  [loginName, loginPw].forEach(el =>
    el.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); doLogin(); } })
  );

  // 이미 로그인돼 있으면(who 쿠키) 바로 앱 표시
  const who = getCookie("who");
  if(who) enterApp(who); else loginName.focus();

  /* ── 채팅 ── */
  function esc(s){
    return s.replace(/[&<>]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c]));
  }
  // 경량 마크다운 렌더러 (굵게/코드/헤딩/불릿). 먼저 HTML 이스케이프 → XSS 방지.
  function renderMd(t){
    const lines = esc(t).split("\n");
    let html = "", inList = false;
    for (let line of lines){
      const bullet = line.match(/^\s*[-*]\s+(.*)$/);
      if (bullet){
        if (!inList){ html += "<ul>"; inList = true; }
        html += "<li>" + inline(bullet[1]) + "</li>";
        continue;
      }
      if (inList){ html += "</ul>"; inList = false; }
      const head = line.match(/^#{1,6}\s*(.*)$/);
      if (head){ html += "<strong>" + inline(head[1]) + "</strong>\n"; continue; }
      html += inline(line) + "\n";
    }
    if (inList) html += "</ul>";
    return html.replace(/\n$/, "");
  }
  function inline(s){
    return s
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>");
  }

  function add(role, text, sources){
    const el = document.createElement("div");
    el.className = "msg " + (role === "user" ? "user" : "bot");
    if (role === "user") el.textContent = text;
    else el.innerHTML = renderMd(text);
    if (sources && sources.length){
      const s = document.createElement("div");
      s.className = "src";
      s.innerHTML = "근거: " + buildSrc(sources);
      el.appendChild(s);
    }
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
    return el;
  }
  // 근거 표기: 같은 법은 하나로 묶어 조문만 나열, 맨 위(핵심 법리) 법령명은 강조.
  function buildSrc(sources){
    const groups = [];        // [{name, arts:[], prec}]
    const idx = new Map();     // 법령명 → groups 인덱스 (같은 법 묶기)
    for (const m of sources){
      if (m.자료유형 === "판례"){
        groups.push({ name: m.법령명 || ("판례 " + (m.사건번호 || "")), arts: [], prec: true });
        continue;
      }
      const name = m.자료유형 === "유권해석" ? ("유권해석 " + (m.문서번호 || "")) : (m.법령명 || "");
      const art = (m.조문 || "").trim();
      if (!idx.has(name)){ idx.set(name, groups.length); groups.push({ name, arts: [] }); }
      if (art) groups[idx.get(name)].arts.push(art);
    }
    return groups.map((g, i) => {
      const nameHtml = i === 0
        ? `<span class="key">${esc(g.name)}</span>`   // 핵심 법리 강조
        : esc(g.name);
      const arts = g.arts.length ? ` <span class="arts">${esc(g.arts.join("·"))}</span>` : "";
      return nameHtml + arts;
    }).join(" · ");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if(!q) return;
    add("user", q);
    history.push({role:"user", content:q});
    input.value = ""; send.disabled = true;
    const thinking = add("bot", "자료를 확인하는 중…");
    try{
      const res = await fetch(API + "/", {
        method:"POST", headers:{"Content-Type":"application/json"},
        credentials:"same-origin",
        body: JSON.stringify({ question:q, history, scope: currentScope() })
      });
      if(res.status === 401){
        thinking.remove();
        loginErr.textContent = "세션이 만료됐습니다. 다시 로그인하세요.";
        loginEl.style.display = "flex"; loginPw.value = ""; loginName.focus();
        return;
      }
      const data = await res.json();
      thinking.remove();
      const answer = data.answer || data.error || "(응답 없음)";
      add("bot", answer, data.sources);
      history.push({role:"assistant", content:answer});
    }catch(err){
      thinking.textContent = "요청 중 오류가 발생했습니다: " + err;
    }finally{
      send.disabled = false; input.focus();
    }
  });

  // Enter 전송 / Shift+Enter 줄바꿈
  input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
  });
</script>
</body>
</html>
