# Cloudflare Worker 배포 설정
# 배포 절차:
#   1) node scripts/build-index.mjs          # corpus-index.json 생성/갱신
#   2) bash scripts/kv-upload.sh             # corpus-index.json → KV(CORPUS_KV) 업로드
#   3) cd chatbot/worker
#   4) npx wrangler secret put DEEPSEEK_KEY   # DeepSeek 키 (코드/toml에 넣지 말 것)
#   5) npx wrangler secret put SITE_PASSWORD  # 접속 비밀번호
#   6) npx wrangler deploy
# corpus만 갱신할 때는 1)→2)만 하면 됨(재배포 불필요, KV만 갱신).
name = "jeongbi"
main = "worker.js"
compatibility_date = "2026-07-23"

# corpus 검색 인덱스는 번들 대신 KV에 저장(무료 한도 1MB 회피). Worker가 콜드스타트에 1회 로드.
[[kv_namespaces]]
binding = "CORPUS_KV"
id = "dfae6c10495d4a2cae9cd8ca707ff6be"

# Workers AI 바인딩 — 임베딩(@cf/baai/bge-m3)을 런타임에 호출(벡터 하이브리드 검색).
[ai]
binding = "AI"

# 채팅 화면(../public/index.html)을 문자열로 번들에 포함 → GET 시 Worker가 직접 서빙.
# 프론트는 chatbot/public/index.html 한 곳에서만 관리(단일 소스).
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# 배경 이미지(어둡게 가공한 koreit 메인비주얼 4종)를 바이너리로 번들 → /bg/N.jpg 서빙.
[[rules]]
type = "Data"
globs = ["**/*.jpg"]
fallthrough = true

# DEEPSEEK_KEY 는 시크릿으로만 주입한다 (wrangler secret put). 여기에 평문으로 쓰지 말 것.
