<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LG 리모컨</title>
<style>
  :root{
    --bg:#101418; --panel:#1a2027; --panel2:#232b34;
    --line:#2e3944; --txt:#e8edf2; --dim:#7d8a96;
    --accent:#c9435a; --ok:#3fae6a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    display:flex; flex-direction:column; padding:14px; gap:12px;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
    max-width:480px; margin:0 auto;
  }
  .connbar{display:flex; gap:8px;}
  .connbar button{
    flex:1; background:var(--accent); border:none; border-radius:10px;
    padding:14px; color:#fff; font-size:15px; font-weight:700;
  }
  #status{font-size:13px; color:var(--dim); min-height:18px; line-height:1.4;}
  #status.ok{color:var(--ok);}
  #status.err{color:var(--accent);}
  #certBtn{display:none;background:var(--panel2);border:1px solid var(--accent);border-radius:10px;padding:12px;color:var(--txt);text-align:center;text-decoration:none;font-size:14px;font-weight:700;}
  #pad{
    flex:1; min-height:200px; background:var(--panel);
    border:1px solid var(--line); border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    color:var(--dim); font-size:14px;
    touch-action:none; position:relative; overflow:hidden;
  }
  #pad.active{border-color:var(--accent);}
  #pad .hint{pointer-events:none; text-align:center; line-height:1.7;}
  .btn{
    background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    color:var(--txt); font-size:15px; font-weight:600;
    display:flex; align-items:center; justify-content:center; height:56px;
  }
  .btn:active{background:var(--accent); border-color:var(--accent);}
  .btn.sub{color:var(--dim); font-size:13px;}
  .dpad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .dpad .btn{height:60px; font-size:20px;}
  .dpad .ok{background:var(--accent); border-color:var(--accent); font-size:15px; font-weight:800;}
  .row{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .row .btn{height:50px; font-size:14px;}
  iframe{display:none;}
</style>
</head>
<body>

<div class="connbar">
  <button id="connectBtn">TV 연결</button>
  <button id="motionBtn" style="background:#232b34;border:1px solid #2e3944;">포인터 OFF</button>
</div>
<div id="status">[TV 연결]을 누르세요.</div>
<a id="certBtn" href="https://192.168.219.133:3001" target="_blank">TV 인증서 승인하러 가기 (최초 1회)</a>

<div id="pad">
  <div class="hint" id="padHint">포인터 OFF<br>아래 [포인터] 버튼으로 켜고 끄세요<br>이 영역 탭 = 클릭 · 두 손가락 = 스크롤</div>
</div>

<div class="dpad">
  <button class="btn sub" data-btn="BACK">뒤로</button>
  <button class="btn" data-btn="UP">▲</button>
  <button class="btn sub" data-btn="EXIT">나가기</button>
  <button class="btn" data-btn="LEFT">◀</button>
  <button class="btn ok" data-btn="ENTER">확인</button>
  <button class="btn" data-btn="RIGHT">▶</button>
  <button class="btn sub" data-btn="HOME">홈</button>
  <button class="btn" data-btn="DOWN">▼</button>
  <button class="btn sub" id="powerBtn">전원끔</button>
</div>

<div class="row">
  <button class="btn" data-btn="VOLUMEDOWN">🔉 −</button>
  <button class="btn" data-btn="VOLUMEUP">🔊 +</button>
  <button class="btn" data-btn="MUTE">무음</button>
  <button class="btn" data-btn="PLAY">▶︎/❚❚</button>
</div>
<div class="row">
  <button class="btn" id="netflixBtn" style="grid-column:span 2;color:#e50914;font-weight:800;font-size:16px;">NETFLIX</button>
  <button class="btn" id="youtubeBtn" style="grid-column:span 2;color:#ff4e45;font-weight:800;font-size:16px;">YouTube</button>
</div>

<script id="bridgeSrc" type="text/plain">
/* ── 무출처(sandbox) 프레임: TV 웹소켓 전담 ──
   https 출처를 TV가 거부(1008 invalid origin)하므로,
   출처가 null인 이 프레임에서만 소켓을 연다. */
var ws=null, ptr=null, msgId=0, pending={};
var PAIRING = __PAIRING__;
function post(o){ parent.postMessage(o, '*'); }
function request(uri, payload, cb){
  if(!ws || ws.readyState !== 1) return;
  var id = 'req_' + (++msgId);
  if(cb) pending[id] = cb;
  ws.send(JSON.stringify({type:'request', id:id, uri:uri, payload:payload||{}}));
}
onmessage = function(e){
  var m = e.data || {};
  if(m.cmd === 'connect'){
    if(ws){ try{ws.close();}catch(x){} }
    if(ptr){ try{ptr.close();}catch(x){} ptr=null; }
    try{ ws = new WebSocket('wss://' + m.ip + ':3001'); }
    catch(x){ post({ev:'status', text:'소켓 생성 실패: '+x.message, cls:'err'}); return; }
    ws.onopen = function(){
      var p = JSON.parse(JSON.stringify(PAIRING));
      if(m.key) p['client-key'] = m.key;
      post({ev:'status', text:'페어링 확인 중…'});
      ws.send(JSON.stringify({type:'register', id:'register_0', payload:p}));
    };
    ws.onmessage = function(ev){
      var msg; try{ msg = JSON.parse(ev.data); }catch(x){ return; }
      if(msg.type === 'registered'){
        if(msg.payload && msg.payload['client-key']) post({ev:'registered', key: msg.payload['client-key']});
        request('ssap://com.webos.service.networkinput/getPointerInputSocket', {}, function(pl){
          if(!pl || !pl.socketPath){ post({ev:'status', text:'포인터 소켓 획득 실패', cls:'err'}); return; }
          ptr = new WebSocket(pl.socketPath);
          ptr.onopen = function(){ post({ev:'status', text:'리모컨 준비 완료 ✓', cls:'ok'}); };
          ptr.onclose = function(){ ptr=null; };
        });
        return;
      }
      if(msg.type === 'error'){ post({ev:'status', text:'TV 오류: '+(msg.error||'?'), cls:'err'}); return; }
      if(msg.id && pending[msg.id]){ pending[msg.id](msg.payload); delete pending[msg.id]; }
    };
    ws.onclose = function(ev){
      post({ev:'closed', code:ev.code, reason:ev.reason||''});
      ptr=null;
    };
  }
  else if(m.cmd === 'ptr'){
    if(!ptr || ptr.readyState !== 1) return;
    var msg = 'type:' + m.type + '\n';
    var p = m.payload || {};
    for(var k in p) msg += k + ':' + p[k] + '\n';
    ptr.send(msg + '\n');
  }
  else if(m.cmd === 'req'){ request(m.uri, m.payload); }
};
post({ev:'bridge-ready'});
</script>

<script>
const DEFAULT_IP = '192.168.219.133';
const DEFAULT_CLIENT_KEY = 'fa8a53101f39bf690466c46ed8b0ee4c';
const PAIRING = {
  "forcePairing": false,
  "pairingType": "PROMPT",
  "manifest": {
    "manifestVersion": 1,
    "appVersion": "1.1",
    "signed": {
      "created": "20140509",
      "appId": "com.lge.test",
      "vendorId": "com.lge",
      "localizedAppNames": {"": "LG Remote App", "ko-KR": "리모컨 앱", "zxx-XX": "ЛГ Rэмotэ AПП"},
      "localizedVendorNames": {"": "LG Electronics"},
      "permissions": ["TEST_SECURE","CONTROL_INPUT_TEXT","CONTROL_MOUSE_AND_KEYBOARD","READ_INSTALLED_APPS","READ_LGE_SDX","READ_NOTIFICATIONS","SEARCH","WRITE_SETTINGS","WRITE_NOTIFICATION_ALERT","CONTROL_POWER","READ_CURRENT_CHANNEL","READ_RUNNING_APPS","READ_UPDATE_INFO","UPDATE_FROM_REMOTE_APP","READ_LGE_TV_INPUT_EVENTS","READ_TV_CURRENT_TIME"],

    },
    "permissions": ["LAUNCH","LAUNCH_WEBAPP","APP_TO_APP","CLOSE","TEST_OPEN","TEST_PROTECTED","CONTROL_AUDIO","CONTROL_DISPLAY","CONTROL_INPUT_JOYSTICK","CONTROL_INPUT_MEDIA_RECORDING","CONTROL_INPUT_MEDIA_PLAYBACK","CONTROL_INPUT_TV","CONTROL_POWER","READ_APP_STATUS","READ_CURRENT_CHANNEL","READ_INPUT_DEVICE_LIST","READ_NETWORK_STATE","READ_RUNNING_APPS","READ_TV_CHANNEL_LIST","WRITE_NOTIFICATION_TOAST","READ_POWER_STATE","READ_COUNTRY_INFO","READ_SETTINGS","CONTROL_TV_SCREEN","CONTROL_TV_STANBY","CONTROL_FAVORITE_GROUP","CONTROL_USER_INFO","CHECK_BLUETOOTH_DEVICE","CONTROL_BLUETOOTH","CONTROL_TIMER_INFO","STB_INTERNAL_CONNECTION","CONTROL_RECORDING","READ_RECORDING_STATE","WRITE_RECORDING_LIST","READ_RECORDING_LIST","READ_RECORDING_SCHEDULE","WRITE_RECORDING_SCHEDULE","READ_STORAGE_DEVICE_LIST","READ_TV_PROGRAM_INFO","CONTROL_BOX_CHANNEL","READ_TV_ACR_AUTH_TOKEN","READ_TV_CONTENT_STATE","READ_TV_CURRENT_TIME","ADD_LAUNCHER_CHANNEL","SET_CHANNEL_SKIP","RELEASE_CHANNEL_SKIP","CONTROL_CHANNEL_BLOCK","DELETE_SELECT_CHANNEL","CONTROL_CHANNEL_GROUP","SCAN_TV_CHANNELS","CONTROL_TV_POWER","CONTROL_WOL"],
    "signatures": [{"signatureVersion":1,"signature":"eyJhbGdvcml0aG0iOiJSU0EtU0hBMjU2Iiwia2V5SWQiOiJ0ZXN0LXNpZ25pbmctY2VydCIsInNpZ25hdHVyZVZlcnNpb24iOjF9.hrVRgjCwXVvE2OOSpDZ58hR+59aFNwYDyjQgKk3auukd7pcegmE2CzPCa0bJ0ZsRAcKkCTJrWo5iDzNhMBWRyaMOv5zWSrthlf7G128qvIlpMT0YNY+n/FaOHE73uLrS/g7swl3/qH/BGFG2Hu4RlL48eb3lLKqTt2xKHdCs6Cd4RMfJPYnzgvI4BNrFUKsjkcu+WD4OO2A27Pq1n50cMchmcaXadJhGrOqH5YmHdOCj5NSHzJYrsW0HPlpuAx/ECMeIZYDh6RMqaFM2DXzdKX9NmmyqzJ3o/0lkk/N97gfVRLW5hA29yeAwaCViZNCP8iC9aO0q9fQojoa7NQnAtw=="}]
  }
};

const $ = s => document.querySelector(s);
const statusEl = $('#status');
function setStatus(t, cls){ statusEl.textContent = t; statusEl.className = cls || ''; }
function saveKey(k){ try{ localStorage.setItem('lgkey', k); }catch(e){} }
function loadKey(){ try{ return localStorage.getItem('lgkey') || DEFAULT_CLIENT_KEY; }catch(e){ return DEFAULT_CLIENT_KEY; } }

/* ── 무출처 브리지 프레임 생성 ── */
let bridge = null, bridgeReady = false;
(function(){
  const src = document.getElementById('bridgeSrc').textContent
    .replace('__PAIRING__', JSON.stringify(PAIRING));
  const f = document.createElement('iframe');
  f.setAttribute('sandbox', 'allow-scripts');
  f.srcdoc = '<script>' + src + '<\/script>';
  document.body.appendChild(f);
  bridge = f;
})();

window.addEventListener('message', e => {
  const m = e.data || {};
  if(m.ev === 'bridge-ready'){ bridgeReady = true; }
  else if(m.ev === 'status'){ setStatus(m.text, m.cls); }
  else if(m.ev === 'registered'){ saveKey(m.key); }
  else if(m.ev === 'closed'){
    setStatus('연결 종료 (code ' + m.code + (m.reason ? ', ' + m.reason : '') + '). 1006이면 아래 버튼으로 인증서를 승인한 뒤 다시 연결하세요.', 'err');
    $('#certBtn').style.display = 'block';
  }
});

function bridgeSend(o){ if(bridge) bridge.contentWindow.postMessage(o, '*'); }
function connect(){
  if(!bridgeReady){ setStatus('브리지 로딩 중… 잠시 후 다시.', 'err'); return; }
  setStatus('연결 중… (wss://' + DEFAULT_IP + ':3001)');
  bridgeSend({cmd:'connect', ip: DEFAULT_IP, key: loadKey()});
}
function ptrSend(type, payload){ bridgeSend({cmd:'ptr', type, payload}); }
function request(uri, payload){ bridgeSend({cmd:'req', uri, payload}); }

document.querySelectorAll('[data-btn]').forEach(b => {
  b.addEventListener('click', () => ptrSend('button', { name: b.dataset.btn }));
});
$('#powerBtn').addEventListener('click', () => {
  if(confirm('TV 전원을 끌까요?')) request('ssap://system/turnOff', {});
});
$('#netflixBtn').addEventListener('click', () => request('ssap://system.launcher/launch', {id:'netflix'}));
$('#youtubeBtn').addEventListener('click', () => request('ssap://system.launcher/launch', {id:'youtube.leanback.v4'}));
$('#connectBtn').addEventListener('click', connect);

/* ── 센서: 자이로 → 기울기 → 방향 → 드래그 ── */
const pad = $('#pad');
const MOTION_SPEED_X = 8, MOTION_SPEED_Y = 24, DEADZONE = 1.5;
const TILT_SPEED = 1.3, TILT_DEAD = 2.5;
const DRAG_SPEED = 2.1;
let holding = false, motionSeen = false, motionSent = 0;
let motionEvents = 0, diagShown = false;
let accelSeen = false, gLP = null, tiltRef = null;
let oriPrev = null, oriSeen = false;
const ORI_SPEED = 9;
let last = null, dragMoved = 0, twoFinger = false, lastY2 = null, tapStart = 0;

function tiltAngles(){
  if(!gLP) return null;
  const {x,y,z} = gLP;
  return {
    roll:  Math.atan2(-x, Math.sqrt(y*y+z*z)) * 180/Math.PI,
    pitch: Math.atan2(-z, Math.sqrt(x*x+y*y)) * 180/Math.PI
  };
}
function tiltMove(){
  if(!accelSeen || !tiltRef) return;
  const a = tiltAngles(); if(!a) return;
  let dr = a.roll - tiltRef.roll, dp = a.pitch - tiltRef.pitch;
  if(Math.abs(dr) < TILT_DEAD) dr = 0; else dr -= Math.sign(dr)*TILT_DEAD;
  if(Math.abs(dp) < TILT_DEAD) dp = 0; else dp -= Math.sign(dp)*TILT_DEAD;
  const dx = Math.round(dr * TILT_SPEED), dy = Math.round(dp * TILT_SPEED);
  if(dx || dy){ ptrSend('move', {dx, dy, down:0}); motionSent += Math.abs(dx)+Math.abs(dy); }
}
function onMotion(e){
  motionEvents++;
  const ag = e.accelerationIncludingGravity;
  if(ag && ag.x !== null){
    accelSeen = true;
    gLP = gLP ? {x:gLP.x*0.8+ag.x*0.2, y:gLP.y*0.8+ag.y*0.2, z:gLP.z*0.8+ag.z*0.2} : {x:ag.x, y:ag.y, z:ag.z};
  }
  if(!holding) return;
  const rr = e.rotationRate;
  if(!rr || (rr.beta === null && rr.gamma === null)){ tiltMove(); return; }
  motionSeen = true;
  const dt = (e.interval && e.interval < 1) ? e.interval : (e.interval ? e.interval/1000 : 1/60);
  let gx = rr.gamma || 0, gy = rr.beta || 0;
  if(Math.abs(gx) < DEADZONE) gx = 0;
  if(Math.abs(gy) < DEADZONE) gy = 0;
  const dx = Math.round(-gx * dt * MOTION_SPEED_X * 10) / 10 | 0;
  const dy = Math.round(-gy * dt * MOTION_SPEED_Y * 10) / 10 | 0;
  if(dx || dy){ ptrSend('move', {dx, dy, down:0}); motionSent += Math.abs(dx)+Math.abs(dy); }
}
window.addEventListener('devicemotion', onMotion);

function wrap180(d){ if(d > 180) d -= 360; if(d < -180) d += 360; return d; }
window.addEventListener('deviceorientation', e => {
  if(e.alpha === null && e.beta === null) return;
  oriSeen = true;
  if(!holding || motionSeen || accelSeen){ oriPrev = null; return; }
  if(oriPrev === null){ oriPrev = {a:e.alpha, b:e.beta}; return; }
  const da = wrap180(e.alpha - oriPrev.a), db = e.beta - oriPrev.b;
  oriPrev = {a:e.alpha, b:e.beta};
  const dx = Math.round(-da * ORI_SPEED), dy = Math.round(-db * ORI_SPEED);
  if(dx || dy){ ptrSend('move', {dx, dy, down:0}); motionSent += Math.abs(dx)+Math.abs(dy); }
});

const motionBtn = $('#motionBtn');
function setMotion(on){
  holding = on;
  motionSent = 0; oriPrev = null;
  if(on) tiltRef = tiltAngles();
  motionBtn.textContent = on ? '포인터 ON' : '포인터 OFF';
  motionBtn.style.background = on ? 'var(--ok)' : '#232b34';
  motionBtn.style.borderColor = on ? 'var(--ok)' : '#2e3944';
  motionBtn.style.color = on ? '#fff' : 'var(--txt)';
  document.getElementById('padHint').innerHTML = on
    ? '포인터 ON — 폰을 움직이면 포인터가 따라갑니다<br>이 영역 탭 = 클릭 · 두 손가락 = 스크롤'
    : '포인터 OFF<br>아래 [포인터] 버튼으로 켜고 끄세요<br>이 영역 탭 = 클릭 · 두 손가락 = 스크롤';
}
motionBtn.addEventListener('click', () => {
  setMotion(!holding);
  if(holding && !diagShown) setTimeout(() => {
      if(motionEvents === 0){
        diagShown = true;
        setStatus('모션센서 차단됨 (secureContext=' + window.isSecureContext + ') → 드래그 모드', 'err');
      } else if(!motionSeen){
        diagShown = true;
        if(accelSeen) setStatus('기울기 모드 — 누른 채 기울인 방향으로 포인터가 흐릅니다 (자이로✗ 가속도✓)', 'ok');
        else if(oriSeen) setStatus('방향센서 모드 (자이로✗ 방향✓)', 'ok');
        else setStatus('자이로✗ 가속도✗ 방향✗ → 드래그 모드', 'err');
      } else {
        diagShown = true;
        setStatus('자이로 모드 ✓ — 매직리모컨처럼 움직이세요', 'ok');
      }
    }, 1000);
});

pad.addEventListener('touchstart', e => {
  pad.classList.add('active');
  if(e.touches.length >= 2){ twoFinger = true; lastY2 = e.touches[0].clientY; }
  else {
    twoFinger = false; tapStart = motionSent;
    last = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    dragMoved = 0;
  }
}, {passive:true});

pad.addEventListener('touchmove', e => {
  e.preventDefault();
  if(twoFinger && e.touches.length >= 2){
    const y = e.touches[0].clientY, dy = y - lastY2;
    if(Math.abs(dy) > 2){ ptrSend('scroll', {dx:0, dy: dy > 0 ? 1 : -1}); lastY2 = y; }
    return;
  }
  if(!holding && last){
    const t = e.touches[0];
    const dx = Math.round((t.clientX - last.x) * DRAG_SPEED);
    const dy = Math.round((t.clientY - last.y) * DRAG_SPEED);
    if(dx || dy){
      ptrSend('move', {dx, dy, down:0});
      dragMoved += Math.abs(dx)+Math.abs(dy);
      last = {x:t.clientX, y:t.clientY};
    }
  }
}, {passive:false});

pad.addEventListener('touchend', e => {
  pad.classList.remove('active');
  if(!twoFinger && (motionSent - tapStart) < 25 && dragMoved < 8) ptrSend('click');
  last = null; twoFinger = false;
}, {passive:true});
</script>
</body>
</html>
